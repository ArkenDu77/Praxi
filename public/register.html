<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxi — Créer un compte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="auth-card">
  <a href="/" class="auth-logo">Prax<span>i</span></a>
  <p class="auth-title">Créer votre compte médecin</p>

  <div class="alert alert-error" id="error"></div>

  <form id="register-form" novalidate>
    <div class="row">
      <div class="field">
        <label for="prenom">Prénom</label>
        <input class="input" type="text" id="prenom" placeholder="Marie" required autocomplete="given-name" />
      </div>
      <div class="field">
        <label for="nom">Nom</label>
        <input class="input" type="text" id="nom" placeholder="Durand" required autocomplete="family-name" />
      </div>
    </div>
    <div class="field">
      <label for="email">Email professionnel</label>
      <input class="input" type="email" id="email" placeholder="vous@cabinet.fr" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Mot de passe</label>
      <input class="input" type="password" id="password" placeholder="8 caractères minimum" required autocomplete="new-password" />
      <p class="hint">8 caractères minimum.</p>
    </div>
    <div class="field">
      <label>Spécialité(s)</label>
      <div class="ms" id="specialite" data-placeholder="Choisir une ou plusieurs spécialités…">
        <div class="ms-trigger" role="button" tabindex="0" aria-haspopup="listbox" aria-expanded="false">
          <span class="ms-value"></span>
          <svg class="ms-caret" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </div>
        <div class="ms-panel" role="listbox" aria-multiselectable="true"></div>
      </div>
      <p class="hint">Vous pouvez en sélectionner plusieurs.</p>
    </div>
    <div class="field">
      <label for="ville">Ville d'exercice</label>
      <input class="input" type="text" id="ville" placeholder="Lyon" required />
    </div>
    <div class="field">
      <label for="rpps">Numéro RPPS <span style="color:var(--text-dim)">(optionnel)</span></label>
      <input class="input" type="text" id="rpps" placeholder="11 chiffres" inputmode="numeric" autocomplete="off" />
    </div>
    <button type="submit" class="btn-submit" id="submit">
      <span class="btn-label">Créer mon compte</span>
    </button>
  </form>

  <p class="auth-foot">Déjà inscrit ? <a href="/login.html">Se connecter</a></p>
  <a href="/" class="auth-back"><i data-lucide="arrow-left"></i> Retour à l'accueil</a>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script>
'use strict';
if (localStorage.getItem('praxi_token')) location.replace('/app.html');

const form  = document.getElementById('register-form');
const btn   = document.getElementById('submit');
const errEl = document.getElementById('error');

// ── Menu déroulant multi-spécialités ──
const SPECIALITES = [
  'Médecine générale', 'Médecine interne', 'Cardiologie', 'Pédiatrie',
  'Gynécologie', 'Psychiatrie', 'Rhumatologie', 'Gériatrie',
  'Médecin algologue', 'Médecin anesthésiste réanimateur', 'Autre spécialité'
];

function initMultiSelect(root, options) {
  const trigger = root.querySelector('.ms-trigger');
  const valueEl = root.querySelector('.ms-value');
  const panel   = root.querySelector('.ms-panel');
  const placeholder = root.dataset.placeholder || 'Choisir…';
  const CHECK = '<span class="ms-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg></span>';

  options.forEach(name => {
    const opt = document.createElement('label');
    opt.className = 'ms-opt'; opt.setAttribute('role', 'option');
    const input = document.createElement('input');
    input.type = 'checkbox'; input.value = name;
    const label = document.createElement('span');
    label.className = 'ms-label'; label.textContent = name;
    opt.appendChild(input);
    opt.insertAdjacentHTML('beforeend', CHECK);
    opt.appendChild(label);
    panel.appendChild(opt);
  });

  function render() {
    const checked = Array.from(panel.querySelectorAll('input:checked'));
    valueEl.innerHTML = '';
    if (!checked.length) {
      const p = document.createElement('span');
      p.className = 'ms-placeholder'; p.textContent = placeholder;
      valueEl.appendChild(p);
      return;
    }
    checked.forEach(box => {
      const chip = document.createElement('span');
      chip.className = 'ms-chip';
      const txt = document.createElement('span');
      txt.textContent = box.value;
      const x = document.createElement('button');
      x.type = 'button'; x.className = 'ms-chip-x'; x.innerHTML = '&times;';
      x.setAttribute('aria-label', 'Retirer ' + box.value);
      x.addEventListener('click', e => {
        e.stopPropagation();
        box.checked = false;
        box.dispatchEvent(new Event('change', { bubbles: true }));
      });
      chip.appendChild(txt); chip.appendChild(x);
      valueEl.appendChild(chip);
    });
  }

  const open  = () => { root.classList.add('open');  trigger.setAttribute('aria-expanded', 'true');  };
  const close = () => { root.classList.remove('open'); trigger.setAttribute('aria-expanded', 'false'); };
  const toggle = () => root.classList.contains('open') ? close() : open();

  trigger.addEventListener('click', toggle);
  trigger.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
    else if (e.key === 'Escape') close();
  });
  root.addEventListener('change', render);
  document.addEventListener('click', e => { if (!root.contains(e.target)) close(); });

  root.refresh = render;
  render();
  return root;
}

initMultiSelect(document.getElementById('specialite'), SPECIALITES);

function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); window.scrollTo(0,0); }
function clearError()   { errEl.textContent = ''; errEl.classList.remove('show'); }
function setLoading(on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span><span class="btn-label">Création…</span>'
    : '<span class="btn-label">Créer mon compte</span>';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  const specialites = Array.from(
    document.querySelectorAll('#specialite input[type="checkbox"]:checked')
  ).map(c => c.value);
  const payload = {
    prenom:      document.getElementById('prenom').value.trim(),
    nom:         document.getElementById('nom').value.trim(),
    email:       document.getElementById('email').value.trim(),
    password:    document.getElementById('password').value,
    specialites,
    ville:       document.getElementById('ville').value.trim(),
    rpps:        document.getElementById('rpps').value.trim()
  };

  if (!payload.prenom || !payload.nom || !payload.email || !specialites.length || !payload.ville) {
    showError('Merci de remplir tous les champs obligatoires (au moins une spécialité).'); return;
  }
  if (payload.password.length < 8) {
    showError('Le mot de passe doit contenir au moins 8 caractères.'); return;
  }

  setLoading(true);
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Inscription impossible.');
    location.replace('/login.html?registered=1');
  } catch (err) {
    showError(err.message);
    setLoading(false);
  }
});
</script>
</body>
</html>
