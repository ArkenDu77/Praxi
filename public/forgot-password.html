<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxi — Mot de passe oublié</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
<style>
.alert-success {
  background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.28);
  color: #86EFAC;
}
.success-icon {
  display: flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(74,222,128,.10); border: 1px solid rgba(74,222,128,.3);
  margin: 0 auto 20px;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="auth-card">
  <a href="/" class="auth-logo">Prax<span>i</span></a>

  <div id="form-view">
    <p class="auth-title">Réinitialiser votre mot de passe</p>

    <div class="alert alert-error" id="error"></div>

    <p style="font-size:13.5px;color:var(--text-muted);text-align:center;margin-bottom:22px;line-height:1.6;">
      Renseignez votre email professionnel et nous vous enverrons un lien de réinitialisation.
    </p>

    <form id="forgot-form" novalidate>
      <div class="field">
        <label for="email">Email professionnel</label>
        <input class="input" type="email" id="email" placeholder="vous@cabinet.fr" required autocomplete="email" />
      </div>
      <button type="submit" class="btn-submit" id="submit">
        <span class="btn-label">Envoyer le lien</span>
      </button>
    </form>
  </div>

  <div id="success-view" style="display:none;text-align:center;">
    <div class="success-icon">
      <i data-lucide="mail-check" style="width:24px;height:24px;color:#4ADE80;"></i>
    </div>
    <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px;">Email envoyé !</p>
    <p style="font-size:13.5px;color:var(--text-muted);line-height:1.65;margin-bottom:0;">
      Si un compte existe pour cette adresse, un lien de réinitialisation valable 1 heure vient d'être envoyé.
    </p>
  </div>

  <p class="auth-foot"><a href="/login.html">Retour à la connexion</a></p>
  <a href="/" class="auth-back"><i data-lucide="arrow-left"></i> Retour à l'accueil</a>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script>
'use strict';
const form  = document.getElementById('forgot-form');
const btn   = document.getElementById('submit');
const errEl = document.getElementById('error');

function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
function clearError()   { errEl.textContent = ''; errEl.classList.remove('show'); }
function setLoading(on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span><span class="btn-label">Envoi…</span>'
    : '<span class="btn-label">Envoyer le lien</span>';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  const email = document.getElementById('email').value.trim();
  if (!email) { showError('Renseignez votre email.'); return; }

  setLoading(true);
  try {
    const res = await fetch('/api/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    await res.json().catch(() => ({}));
    // Toujours afficher le succès (ne pas révéler si l'email existe)
    document.getElementById('form-view').style.display   = 'none';
    document.getElementById('success-view').style.display = 'block';
    lucide.createIcons();
  } catch (_) {
    document.getElementById('form-view').style.display   = 'none';
    document.getElementById('success-view').style.display = 'block';
    lucide.createIcons();
  }
});
</script>
</body>
</html>
