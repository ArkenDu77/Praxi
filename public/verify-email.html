<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxi — Vérification email</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
<style>
.otp-row {
  display: flex; gap: 10px; justify-content: center; margin: 24px 0 8px;
}
.otp-box {
  width: 48px; height: 56px; text-align: center;
  font-size: 22px; font-weight: 600; font-family: 'DM Serif Display', monospace;
  background: var(--bg-card2); border: 1px solid var(--border2); border-radius: 8px;
  color: var(--text); outline: none; caret-color: var(--accent);
  transition: border-color .2s, box-shadow .2s;
}
.otp-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.otp-box.filled { border-color: var(--border); }
.email-hint {
  font-size: 13.5px; color: var(--text-muted); text-align: center;
  margin-bottom: 4px; line-height: 1.5;
}
.email-hint strong { color: var(--text); font-weight: 500; }
.resend-row {
  text-align: center; margin-top: 18px; font-size: 13px; color: var(--text-dim);
}
.resend-row a { color: var(--accent); text-decoration: none; cursor: pointer; }
.resend-row a:hover { text-decoration: underline; }
.alert-success {
  background: rgba(74,222,128,.08); border: 1px solid rgba(74,222,128,.28);
  color: #86EFAC;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="auth-card">
  <a href="/" class="auth-logo">Prax<span>i</span></a>
  <p class="auth-title">Vérification de votre email</p>

  <div class="alert alert-error" id="error"></div>
  <div class="alert alert-success" id="success"></div>

  <p class="email-hint">Un code à 6 chiffres a été envoyé à<br><strong id="email-display"></strong></p>

  <div class="otp-row" id="otp-row">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
    <input class="otp-box" type="text" inputmode="numeric" maxlength="1" autocomplete="off">
  </div>

  <button class="btn-submit" id="submit" disabled>
    <span class="btn-label">Vérifier mon compte</span>
  </button>

  <div class="resend-row">
    Vous n'avez pas reçu de code ? <a id="resend-btn">Renvoyer</a>
  </div>

  <a href="/login.html" class="auth-back"><i data-lucide="arrow-left"></i> Retour à la connexion</a>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script>
'use strict';
if (localStorage.getItem('praxi_token')) location.replace('/app.html');

const params = new URLSearchParams(location.search);
const email  = params.get('email') || '';
if (!email) location.replace('/login.html');

document.getElementById('email-display').textContent = email;

const boxes   = Array.from(document.querySelectorAll('.otp-box'));
const btn     = document.getElementById('submit');
const errEl   = document.getElementById('error');
const okEl    = document.getElementById('success');

function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); okEl.classList.remove('show'); }
function clearError()   { errEl.textContent = ''; errEl.classList.remove('show'); }
function showOk(msg)    { okEl.textContent = msg; okEl.classList.add('show'); errEl.classList.remove('show'); }

function getCode() { return boxes.map(b => b.value).join(''); }
function checkFull() { btn.disabled = getCode().length < 6; }

boxes.forEach((box, i) => {
  box.addEventListener('input', () => {
    const val = box.value.replace(/\D/g, '');
    box.value = val ? val[val.length - 1] : '';
    box.classList.toggle('filled', !!box.value);
    if (box.value && i < 5) boxes[i + 1].focus();
    checkFull();
  });

  box.addEventListener('keydown', e => {
    if (e.key === 'Backspace' && !box.value && i > 0) {
      boxes[i - 1].value = '';
      boxes[i - 1].classList.remove('filled');
      boxes[i - 1].focus();
      checkFull();
    }
    if (e.key === 'ArrowLeft'  && i > 0) boxes[i - 1].focus();
    if (e.key === 'ArrowRight' && i < 5) boxes[i + 1].focus();
  });

  box.addEventListener('paste', e => {
    e.preventDefault();
    const digits = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 6);
    digits.split('').forEach((d, j) => {
      if (boxes[j]) { boxes[j].value = d; boxes[j].classList.add('filled'); }
    });
    const next = Math.min(digits.length, 5);
    boxes[next].focus();
    checkFull();
  });
});

function setLoading(on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span><span class="btn-label">Vérification…</span>'
    : '<span class="btn-label">Vérifier mon compte</span>';
}

btn.addEventListener('click', async () => {
  clearError();
  const code = getCode();
  if (code.length < 6) return;

  setLoading(true);
  try {
    const res  = await fetch('/api/auth/verify-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Code incorrect.');
    localStorage.setItem('praxi_token', data.token);
    localStorage.setItem('praxi_profil', JSON.stringify(data.user));
    location.replace('/app.html');
  } catch (err) {
    showError(err.message);
    setLoading(false);
  }
});

document.getElementById('resend-btn').addEventListener('click', async () => {
  clearError();
  try {
    await fetch('/api/auth/resend-verification', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    showOk('Un nouveau code a été envoyé à ' + email);
  } catch (_) {
    showOk('Un nouveau code a été envoyé.');
  }
});
</script>
</body>
</html>
