<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Praxi — Nouveau mot de passe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/auth.css">
<style>
.success-icon {
  display: flex; align-items: center; justify-content: center;
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(74,222,128,.10); border: 1px solid rgba(74,222,128,.3);
  margin: 0 auto 20px;
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="auth-card">
  <a href="/" class="auth-logo">Prax<span>i</span></a>

  <div id="invalid-view" style="display:none;text-align:center;">
    <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px;">Lien invalide</p>
    <p style="font-size:13.5px;color:var(--text-muted);line-height:1.65;">Ce lien de réinitialisation est invalide ou expiré.<br>Faites une nouvelle demande.</p>
    <p class="auth-foot" style="margin-top:20px;"><a href="/forgot-password.html">Nouvelle demande</a></p>
  </div>

  <div id="form-view">
    <p class="auth-title">Choisir un nouveau mot de passe</p>

    <div class="alert alert-error" id="error"></div>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="password">Nouveau mot de passe</label>
        <input class="input" type="password" id="password" placeholder="8 caractères minimum" required autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="confirm">Confirmer le mot de passe</label>
        <input class="input" type="password" id="confirm" placeholder="Répétez votre mot de passe" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn-submit" id="submit">
        <span class="btn-label">Enregistrer le mot de passe</span>
      </button>
    </form>
  </div>

  <div id="success-view" style="display:none;text-align:center;">
    <div class="success-icon">
      <i data-lucide="check" style="width:24px;height:24px;color:#4ADE80;"></i>
    </div>
    <p style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:10px;">Mot de passe mis à jour !</p>
    <p style="font-size:13.5px;color:var(--text-muted);line-height:1.65;margin-bottom:0;">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
    <p class="auth-foot" style="margin-top:20px;"><a href="/login.html">Se connecter</a></p>
  </div>

  <a href="/" class="auth-back" id="back-link"><i data-lucide="arrow-left"></i> Retour à l'accueil</a>
</div>

<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
<script>
'use strict';
const params = new URLSearchParams(location.search);
const token  = params.get('token') || '';

if (!token) {
  document.getElementById('form-view').style.display    = 'none';
  document.getElementById('invalid-view').style.display = 'block';
}

const form  = document.getElementById('reset-form');
const btn   = document.getElementById('submit');
const errEl = document.getElementById('error');

function showError(msg) { errEl.textContent = msg; errEl.classList.add('show'); }
function clearError()   { errEl.textContent = ''; errEl.classList.remove('show'); }
function setLoading(on) {
  btn.disabled = on;
  btn.innerHTML = on
    ? '<span class="spinner"></span><span class="btn-label">Enregistrement…</span>'
    : '<span class="btn-label">Enregistrer le mot de passe</span>';
}

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  clearError();
  const password = document.getElementById('password').value;
  const confirm  = document.getElementById('confirm').value;

  if (password.length < 8) { showError('Le mot de passe doit contenir au moins 8 caractères.'); return; }
  if (password !== confirm) { showError('Les mots de passe ne correspondent pas.'); return; }

  setLoading(true);
  try {
    const res  = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Erreur lors de la réinitialisation.');
    document.getElementById('form-view').style.display    = 'none';
    document.getElementById('success-view').style.display = 'block';
    lucide.createIcons();
  } catch (err) {
    showError(err.message);
    setLoading(false);
  }
});
</script>
</body>
</html>
